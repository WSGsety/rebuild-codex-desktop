name: Build Codex Desktop for Windows

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Deprecated; unchanged App and embedded CLI are always skipped"
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: "24"

concurrency:
  group: codex-desktop-windows-release
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install 7-Zip
        run: choco install 7zip -y

      - name: Add 7zz alias
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe"
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Sync upstream Windows app
        run: node scripts/sync-upstream.js --force --skip-mac

      - name: Read packaged app and CLI versions
        id: version
        shell: bash
        run: |
          APP_VERSION=$(node -e "const fs=require('fs');const p='src/win/_asar/package.json';const pkg=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(pkg.version||'')")
          WIN_PACKAGE_VERSION=$(node -e "const fs=require('fs');const p='scripts/.versions.json';const v=JSON.parse(fs.readFileSync(p,'utf8'));process.stdout.write(v.win?.version||'')")
          CODEX_CLI_VERSION=$(npm view @openai/codex version --json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>process.stdout.write(JSON.parse(d)))")
          if [ -z "$APP_VERSION" ] || [ -z "$WIN_PACKAGE_VERSION" ] || [ -z "$CODEX_CLI_VERSION" ]; then
            echo "No complete Windows app and Codex CLI version set detected"
            exit 1
          fi
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "win_package_version=$WIN_PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "codex_cli_version=$CODEX_CLI_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=Codex-win-x64-$APP_VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Check existing app-version release
        id: existing
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          CODEX_CLI_VERSION: ${{ steps.version.outputs.codex_cli_version }}
          ZIP_NAME: ${{ steps.version.outputs.zip_name }}
        run: |
          EXISTING_RELEASE="$(
            gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" | node -e '
              const { CODEX_CLI_VERSION: cli, TAG: tag, ZIP_NAME: zip } = process.env;
              const marker = `<!-- codex-cli-version:${cli} -->`;
              let data = "";
              process.stdin.on("data", (chunk) => data += chunk);
              process.stdin.on("end", () => {
                const releases = JSON.parse(data);
                const hit = releases.find((release) => {
                  const assets = new Set((release.assets || []).map((asset) => asset.name));
                  return release.tag_name === tag &&
                    release.body?.includes(marker) &&
                    assets.has(zip) &&
                    assets.has("SHA256SUMS.txt");
                });
                if (hit) process.stdout.write(hit.tag_name);
              });
            '
          )"
          if [ -n "$EXISTING_RELEASE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "existing_release=$EXISTING_RELEASE" >> "$GITHUB_OUTPUT"
            echo "$ZIP_NAME already exists in $EXISTING_RELEASE"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch app
        if: steps.existing.outputs.skip == 'false'
        run: node scripts/patch-all.js win

      - name: Build Windows zip
        if: steps.existing.outputs.skip == 'false'
        env:
          CODEX_CLI_VERSION: ${{ steps.version.outputs.codex_cli_version }}
          CODEX_WINDOWS_PACKAGE_VERSION: ${{ steps.version.outputs.win_package_version }}
        run: npm run build:win-x64

      - name: Create checksums
        if: steps.existing.outputs.skip == 'false'
        shell: bash
        env:
          ZIP_NAME: ${{ steps.version.outputs.zip_name }}
        run: |
          cd out
          test -f "$ZIP_NAME"
          sha256sum "$ZIP_NAME" > SHA256SUMS.txt

      - name: Publish release
        if: steps.existing.outputs.skip == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          WIN_PACKAGE_VERSION: ${{ steps.version.outputs.win_package_version }}
          CODEX_CLI_VERSION: ${{ steps.version.outputs.codex_cli_version }}
          ZIP_NAME: ${{ steps.version.outputs.zip_name }}
        run: |
          RELEASE_NOTES="基于 Microsoft Store Windows x64 安装包 $WIN_PACKAGE_VERSION 重新打包，App 版本为 $APP_VERSION。下载 ZIP 并解压后，运行“ChatGPT.exe”即可使用。"
          VERIFIED_RELEASE_NOTES="$RELEASE_NOTES <!-- codex-cli-version:$CODEX_CLI_VERSION -->"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes "$RELEASE_NOTES"
            gh release upload "$TAG" "out/$ZIP_NAME" out/SHA256SUMS.txt --clobber
          else
            gh release create "$TAG" "out/$ZIP_NAME" out/SHA256SUMS.txt \
              --title "$TAG" \
              --notes "$RELEASE_NOTES"
          fi
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" | node -e '
            const fs = require("fs");
            const zip = process.env.ZIP_NAME;
            let data = "";
            process.stdin.on("data", (chunk) => data += chunk);
            process.stdin.on("end", () => {
              const release = JSON.parse(data);
              for (const [name, file] of [[zip, `out/${zip}`], ["SHA256SUMS.txt", "out/SHA256SUMS.txt"]]) {
                const asset = (release.assets || []).find((item) => item.name === name);
                if (!asset || asset.size !== fs.statSync(file).size) {
                  throw new Error(`Release asset verification failed: ${name}`);
                }
              }
            });
          '
          gh release edit "$TAG" --title "$TAG" --notes "$VERIFIED_RELEASE_NOTES"
