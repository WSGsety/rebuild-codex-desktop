name: Package Codex portable

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build portable package
        id: build
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/package_codex.py --output dist

      - name: Check existing release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: codex-portable-${{ steps.build.outputs.upstream_tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: codex-portable-${{ steps.build.outputs.upstream_tag }}
          VERSION: ${{ steps.build.outputs.version }}
          UPSTREAM_TAG: ${{ steps.build.outputs.upstream_tag }}
          ARTIFACT: ${{ steps.build.outputs.artifact }}
          CHECKSUM: ${{ steps.build.outputs.checksum }}
        run: |
          gh release create "$TAG" "$ARTIFACT" "$CHECKSUM" \
            --title "Codex portable $VERSION" \
            --notes "Rebuilt from openai/codex $UPSTREAM_TAG. This is a portable Windows CLI package, not a Microsoft Store desktop app package."

